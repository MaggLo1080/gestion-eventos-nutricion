<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGE - Centro de Nutrición Funcional</title>
  
  <!-- Tipografía Profesional -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Paleta Oficial Centro de Nutrición Funcional */
      --brand-red: #FF5263;
      --brand-green: #99CC00;
      --brand-dark: #3F426B;
      --brand-light: #F8FAFC;
      --brand-surface: #FFFFFF;

      /* Gradiantes */
      --grad-brand: linear-gradient(135deg, #FF5263 0%, #99CC00 100%);
      --grad-brand-subtle: linear-gradient(135deg, rgba(255, 82, 99, 0.05) 0%, rgba(153, 204, 0, 0.08) 100%);
      --grad-hover: linear-gradient(135deg, #E04354 0%, #88B800 100%);

      /* Sombras y Radios */
      --shadow-sm: 0 2px 8px rgba(63, 66, 107, 0.04);
      --shadow-md: 0 8px 24px rgba(63, 66, 107, 0.07);
      --shadow-lg: 0 16px 32px rgba(63, 66, 107, 0.12);
      --radius-card: 16px;
      --radius-btn: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--brand-light);
      color: var(--brand-dark);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Top Navigation Glassmorphism */
    .navbar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(63, 66, 107, 0.08);
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-logo {
      height: 42px;
      object-fit: contain;
    }

    .brand-title {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--brand-dark);
      letter-spacing: -0.02em;
    }

    .brand-tag {
      font-size: 0.75rem;
      background: var(--grad-brand-subtle);
      color: var(--brand-red);
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 82, 99, 0.2);
    }

    /* Main Container */
    .container {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* Top Section Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Custom Card Style */
    .card {
      background: var(--brand-surface);
      border-radius: var(--radius-card);
      border: 1px solid rgba(63, 66, 107, 0.06);
      box-shadow: var(--shadow-md);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--grad-brand);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--brand-dark);
    }

    /* Controles de Formulario */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--brand-dark);
    }

    .input-custom, .select-custom {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-btn);
      border: 1.5px solid rgba(63, 66, 107, 0.15);
      background-color: #FFFFFF;
      color: var(--brand-dark);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-custom:focus, .select-custom:focus {
      border-color: var(--brand-red);
      box-shadow: 0 0 0 4px rgba(255, 82, 99, 0.12);
    }

    /* Botones */
    .btn {
      font-family: inherit;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--grad-brand);
      color: #FFFFFF;
      box-shadow: 0 4px 14px rgba(255, 82, 99, 0.25);
    }

    .btn-primary:hover {
      background: var(--grad-hover);
      box-shadow: 0 6px 18px rgba(153, 204, 0, 0.35);
      transform: translateY(-1px);
    }

    .btn-excel {
      background: #107C41;
      color: #FFFFFF;
      box-shadow: 0 4px 12px rgba(16, 124, 65, 0.2);
    }

    .btn-excel:hover {
      background: #0B5B30;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #F1F5F9;
      color: var(--brand-dark);
      border: 1px solid rgba(63, 66, 107, 0.1);
    }

    .btn-secondary:hover {
      background: #E2E8F0;
    }

    .btn-toggle {
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      border-radius: 8px;
    }

    /* Event Summary Counter Card */
    .summary-box {
      background: var(--grad-brand-subtle);
      border-radius: var(--radius-card);
      padding: 1.25rem;
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-top: 1rem;
      border: 1px solid rgba(153, 204, 0, 0.2);
    }

    .metric-item {
      text-align: center;
    }

    .metric-val {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .metric-val.presente { color: var(--brand-green); }
    .metric-val.ausente { color: var(--brand-red); }

    .metric-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }

    /* Control Bar above Table */
    .table-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 280px;
      position: relative;
    }

    /* Tabla Elegante */
    .table-container {
      background: white;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(63, 66, 107, 0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: var(--grad-brand-subtle);
      color: var(--brand-dark);
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid rgba(63, 66, 107, 0.08);
    }

    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(63, 66, 107, 0.05);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    tr:hover td {
      background-color: rgba(248, 250, 252, 0.8);
    }

    /* Badges de Asistencia */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .badge-presente {
      background: rgba(153, 204, 0, 0.15);
      color: #557300;
      border: 1px solid rgba(153, 204, 0, 0.3);
    }

    .badge-ausente {
      background: rgba(255, 82, 99, 0.1);
      color: var(--brand-red);
      border: 1px solid rgba(255, 82, 99, 0.2);
    }

    /* Modal Estilizado */
    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(63, 66, 107, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--brand-dark);
      opacity: 0.5;
    }

    .close-modal:hover { opacity: 1; }
  </style>
</head>
<body>

  <!-- HEADER NAVBAR -->
  <nav class="navbar">
    <div class="brand-container">
      <!-- Muestra el logo institucional enviado o fallback textual -->
      <img src="https://i.ibb.co/vzRkVpB/logo-cnf.png" alt="Logo CNF" class="brand-logo" onerror="this.style.display='none'">
      <div>
        <span class="brand-title">Centro de Nutrición Funcional</span>
        <span class="brand-tag">Acreditación Real-Time</span>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="container">
    
    <div class="dashboard-grid">
      
      <!-- PANEL 1: Crear Evento -->
      <div class="card">
        <h2 class="card-title">➕ Nuevo Evento</h2>
        <form id="formCrearEvento">
          <div class="form-group">
            <label class="form-label">Nombre del Evento</label>
            <input type="text" id="evNombre" class="input-custom" placeholder="Ej: Simposio de Nutrición 2026" required>
          </div>
          <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" id="evFecha" class="input-custom" required>
          </div>
          <div class="form-group">
            <label class="form-label">Descripción (Opcional)</label>
            <input type="text" id="evDesc" class="input-custom" placeholder="Sede / Ponente">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Crear Evento</button>
        </form>
      </div>

      <!-- PANEL 2: Selector y Métricas del Evento Activo -->
      <div class="card">
        <h2 class="card-title">🎯 Evento Seleccionado</h2>
        <div class="form-group">
          <label class="form-label">Selecciona el Evento a Gestionar:</label>
          <select id="selectEventos" class="select-custom">
            <option value="">Cargando eventos...</option>
          </select>
        </div>

        <div class="summary-box">
          <div class="metric-item">
            <div id="metricTotal" class="metric-val">0</div>
            <div class="metric-label">Registrados</div>
          </div>
          <div class="metric-item">
            <div id="metricPresentes" class="metric-val presente">0</div>
            <div class="metric-label">Asistieron</div>
          </div>
          <div class="metric-item">
            <div id="metricAusentes" class="metric-val ausente">0</div>
            <div class="metric-label">Ausentes</div>
          </div>
        </div>
      </div>

    </div>

    <!-- BARRA DE BÚSQUEDA Y ACCIONES PRINCIPALES -->
    <div class="table-controls">
      <div class="search-box">
        <input type="text" id="inputBuscar" class="input-custom" placeholder="🔍 Buscar por Cédula, Nombre o Correo...">
      </div>
      
      <div style="display: flex; gap: 0.75rem;">
        <button id="btnNuevoParticipante" class="btn btn-secondary">
          👤 Nuevo Participante
        </button>
        <button id="btnExportarExcel" class="btn btn-excel">
          📊 Exportar Reporte Excel
        </button>
      </div>
    </div>

    <!-- TABLA DE PARTICIPANTES Y ACREDITACIÓN -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Cédula</th>
            <th>Nombre Completo</th>
            <th>Contacto</th>
            <th>Profesión</th>
            <th>Estado</th>
            <th>Hora Acreditación</th>
            <th style="text-align: center;">Acción</th>
          </tr>
        </thead>
        <tbody id="tablaCuerpo">
          <tr>
            <td colspan="7" style="text-align: center; color: #888; padding: 2rem;">
              Seleccione un evento para cargar la lista de participantes.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- MODAL: REGISTRAR NUEVO PARTICIPANTE EN CALIENTE -->
  <div id="modalParticipante" class="modal-backdrop">
    <div class="modal-content">
      <button class="close-modal" id="btnCerrarModal">&times;</button>
      <h2 class="card-title">👤 Registrar Nuevo Participante</h2>
      <form id="formNuevoParticipante">
        <div class="form-group">
          <label class="form-label">Cédula de Ciudadanía *</label>
          <input type="text" id="partId" class="input-custom" placeholder="Ej: 119310943" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nombre Completo *</label>
          <input type="text" id="partNombre" class="input-custom" required>
        </div>
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" id="partCorreo" class="input-custom">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp / Teléfono</label>
          <input type="text" id="partWhatsapp" class="input-custom">
        </div>
        <div class="form-group">
          <label class="form-label">Profesión</label>
          <input type="text" id="partProfesion" class="input-custom" placeholder="Ej: Nutricionista">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Guardar e Inscribir</button>
      </form>
    </div>
  </div>

  <!-- SCRIPT LOGIC -->
  <script>
    let eventoActualId = null;
    let debounceTimer = null;

    // Elementos DOM
    const selectEventos = document.getElementById('selectEventos');
    const inputBuscar = document.getElementById('inputBuscar');
    const tablaCuerpo = document.getElementById('tablaCuerpo');
    const btnExportarExcel = document.getElementById('btnExportarExcel');
    
    // Métricas DOM
    const metricTotal = document.getElementById('metricTotal');
    const metricPresentes = document.getElementById('metricPresentes');
    const metricAusentes = document.getElementById('metricAusentes');

    // Inicialización
    document.addEventListener('DOMContentLoaded', () => {
      // Establecer fecha de hoy en selector de fecha
      document.getElementById('evFecha').valueToDate = new Date();
      document.getElementById('evFecha').value = new Date().toISOString().split('T')[0];
      
      cargarEventos();
    });

    // 1. Cargar Historial de Eventos
    async function cargarEventos() {
      try {
        const res = await fetch('/eventos');
        const eventos = await res.json();
        
        selectEventos.innerHTML = '';
        if (eventos.length === 0) {
          selectEventos.innerHTML = '<option value="">No hay eventos creados</option>';
          return;
        }

        eventos.forEach(ev => {
          const opt = document.createElement('option');
          opt.value = ev.id;
          opt.textContent = `${ev.fecha} - ${ev.nombre}`;
          selectEventos.appendChild(opt);
        });

        // Seleccionar automáticamente el primero
        eventoActualId = eventos[0].id;
        cargarParticipantes();

      } catch (err) {
        console.error("Error al cargar eventos:", err);
      }
    }

    // Al cambiar de evento en el select
    selectEventos.addEventListener('change', (e) => {
      eventoActualId = e.target.value;
      if (eventoActualId) cargarParticipantes();
    });

    // 2. Cargar Lista de Participantes y Acreditación
    async function cargarParticipantes() {
      if (!eventoActualId) return;

      const query = inputBuscar.value.trim();
      try {
        const res = await fetch(`/eventos/${eventoActualId}/buscar?query=${encodeURIComponent(query)}`);
        const data = await res.json();

        renderizarTabla(data);
      } catch (err) {
        console.error("Error cargando lista de participantes:", err);
      }
    }

    // Renderizar Filas de la Tabla
    function renderizarTabla(lista) {
      tablaCuerpo.innerHTML = '';

      let total = lista.length;
      let presentes = 0;

      if (total === 0) {
        tablaCuerpo.innerHTML = `
          <tr>
            <td colspan="7" style="text-align: center; color: #888; padding: 2rem;">
              No se encontraron participantes.
            </td>
          </tr>`;
        actualizarMetricas(0, 0, 0);
        return;
      }

      lista.forEach(p => {
        const asistio = p.asistio === 1;
        if (asistio) presentes++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${p.id}</strong></td>
          <td>${p.nombre}</td>
          <td>
            <div style="font-size:0.85rem;">${p.correo || '-'}</div>
            <div style="font-size:0.78rem; color:#666;">${p.whatsapp || ''}</div>
          </td>
          <td>${p.profesion || '-'}</td>
          <td>
            <span class="badge ${asistio ? 'badge-presente' : 'badge-ausente'}">
              ${asistio ? '● PRESENTE' : '○ AUSENTE'}
            </span>
          </td>
          <td>${p.hora_acreditacion || '-'}</td>
          <td style="text-align: center;">
            ${asistio ? `
              <button onclick="desmarcarAsistencia('${p.id}')" class="btn btn-secondary btn-toggle">
                Desmarcar
              </button>
            ` : `
              <button onclick="acreditar('${p.id}')" class="btn btn-primary btn-toggle">
                Acreditar
              </button>
            `}
          </td>
        `;
        tablaCuerpo.appendChild(tr);
      });

      actualizarMetricas(total, presentes, total - presentes);
    }

    function actualizarMetricas(tot, pres, aus) {
      metricTotal.textContent = tot;
      metricPresentes.textContent = pres;
      metricAusentes.textContent = aus;
    }

    // 3. Acreditar Participante
    async function acreditar(participanteId) {
      try {
        const res = await fetch(`/eventos/${eventoActualId}/acreditar/${participanteId}`, {
          method: 'POST'
        });
        if (res.ok) {
          cargarParticipantes();
        }
      } catch (err) {
        alert("Error al marcar asistencia");
      }
    }

    // 4. Desmarcar Asistencia
    async function desmarcarAsistencia(participanteId) {
      try {
        const res = await fetch(`/eventos/${eventoActualId}/acreditar/${participanteId}`, {
          method: 'DELETE'
        });
        if (res.ok) {
          cargarParticipantes();
        }
      } catch (err) {
        alert("Error al desmarcar asistencia");
      }
    }

    // 5. Búsqueda con Debounce
    inputBuscar.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        cargarParticipantes();
      }, 250);
    });

    // 6. Crear Evento
    document.getElementById('formCrearEvento').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        nombre: document.getElementById('evNombre').value,
        fecha: document.getElementById('evFecha').value,
        descripcion: document.getElementById('evDesc').value
      };

      try {
        const res = await fetch('/eventos', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          document.getElementById('evNombre').value = '';
          cargarEventos();
        }
      } catch (err) {
        alert("Error al crear evento");
      }
    });

    // 7. Descargar Excel de Asistencia
    btnExportarExcel.addEventListener('click', () => {
      if (!eventoActualId) {
        alert("Selecciona un evento primero");
        return;
      }
      window.location.href = `/eventos/${eventoActualId}/excel`;
    });

    // 8. Lógica de Modal para Nuevo Participante
    const modal = document.getElementById('modalParticipante');
    document.getElementById('btnNuevoParticipante').addEventListener('click', () => modal.classList.add('active'));
    document.getElementById('btnCerrarModal').addEventListener('click', () => modal.classList.remove('active'));

    document.getElementById('formNuevoParticipante').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        id: document.getElementById('partId').value.trim(),
        nombre: document.getElementById('partNombre').value.trim(),
        correo: document.getElementById('partCorreo').value.trim() || null,
        whatsapp: document.getElementById('partWhatsapp').value.trim() || null,
        profesion: document.getElementById('partProfesion').value.trim() || null
      };

      try {
        const res = await fetch('/participantes', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          modal.classList.remove('active');
          document.getElementById('formNuevoParticipante').reset();
          cargarParticipantes();
        }
      } catch (err) {
        alert("Error al registrar participante");
      }
    });
  </script>
</body>
</html>
